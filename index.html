<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freshie Heros — Job Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon: #7B1A1A;
      --maroon-dark: #5a1212;
      --maroon-light: #9e2222;
      --cream: #F5F0E8;
      --cream-dark: #ebe4d6;
      --sand: #FAF7F2;
      --wave: #1a6b8a;
      --wave-light: #e6f3f8;
      --ink: #2C2C2A;
      --ink-mid: #5a5a58;
      --stone: #D3CFC7;
      --green: #2d6a2d;
      --green-light: #e8f5e8;
      --orange: #c25a00;
      --orange-light: #fff3e0;
      --red: #b91c1c;
      --red-light: #fef2f2;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--sand);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--maroon);
      color: var(--cream);
      padding: 0;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 28px 22px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .header-logo {
      width: 130px;
      height: 130px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(245,240,232,0.25);
    }
    @media (max-width: 600px) {
      .header-logo { width: 72px; height: 72px; border-radius: 10px; }
    }
    .header-text h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: var(--cream);
    }
    .header-text .subtitle {
      font-size: 14px;
      color: rgba(245,240,232,0.7);
      margin-top: 5px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    @media (max-width: 600px) {
      .header-inner { padding: 16px 16px 14px; gap: 14px; }
      .header-text h1 { font-size: 22px; }
      .header-text .subtitle { font-size: 12px; }
    }
    .header-bar {
      background: var(--maroon-dark);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(245,240,232,0.6);
      text-align: center;
      letter-spacing: 0.3px;
    }
    #last-updated { color: rgba(245,240,232,0.85); font-weight: 600; }

    /* ── Controls ── */
    .controls {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 20px 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-wrap input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid var(--stone);
      border-radius: 7px;
      font-size: 13px;
      font-family: var(--font);
      background: #fff;
    }
    .search-wrap input:focus { outline: none; border-color: var(--maroon); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #aaa; }
    .filter-select {
      padding: 9px 10px;
      border: 1px solid var(--stone);
      border-radius: 7px;
      font-size: 13px;
      font-family: var(--font);
      background: #fff;
      color: var(--ink);
    }
    .filter-select:focus { outline: none; border-color: var(--maroon); }
    .toggle-done {
      padding: 9px 14px;
      border: 1px solid var(--stone);
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      background: #fff;
      color: var(--ink-mid);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }
    .toggle-done.active { background: var(--maroon); color: var(--cream); border-color: var(--maroon); }

    /* ── Name banner ── */
    .name-banner {
      max-width: 1100px;
      margin: 0 auto 4px;
      padding: 0 20px;
    }
    .name-row {
      background: var(--cream);
      border: 1px solid var(--stone);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .name-row label { color: var(--ink-mid); white-space: nowrap; font-weight: 500; flex-shrink: 0; }
    .name-row input {
      flex: 1;
      min-width: 140px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-family: var(--font);
      color: var(--ink);
    }
    .name-row input:focus { outline: none; }
    .name-row input::placeholder { color: #bbb; }
    .name-hint { font-size: 11px; color: #aaa; }

    /* ── Stats bar ── */
    .stats-bar {
      max-width: 1100px;
      margin: 10px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .stat-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .stat-chip.total { background: rgba(123,26,26,0.08); color: var(--maroon); }
    .stat-chip.high { background: var(--red-light); color: var(--red); }
    .stat-chip.done-count { background: var(--green-light); color: var(--green); }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Job cards ── */
    .jobs-wrap {
      max-width: 1100px;
      margin: 14px auto 40px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job-card {
      background: #fff;
      border: 1px solid var(--stone);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.2s;
    }
    .job-card.is-done { opacity: 0.6; }
    .job-card.is-done .job-title { text-decoration: line-through; color: #aaa; }
    .job-card.hidden { display: none; }

    .job-header {
      padding: 14px 16px 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .job-number {
      font-size: 10px;
      font-weight: 700;
      color: #aaa;
      padding-top: 2px;
      white-space: nowrap;
      min-width: 36px;
    }
    .job-main { flex: 1; min-width: 0; }
    .job-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
      margin-bottom: 6px;
    }
    .job-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-high { background: var(--red-light); color: var(--red); border: 1px solid #fecaca; }
    .badge-medium { background: var(--orange-light); color: var(--orange); border: 1px solid #fed7aa; }
    .badge-low { background: var(--green-light); color: var(--green); border: 1px solid #bbf7d0; }
    .badge-safety { background: #7B1A1A; color: #fff; }
    /* Category badges */
    .badge-cat-repair      { background: #fff7ed; color: #c2510a; border: 1px solid #fed7aa; }
    .badge-cat-replace     { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-cat-painting    { background: #f5f3ff; color: #6d28d9; border: 1px solid #ddd6fe; }
    .badge-cat-cleaning    { background: #f0fdfa; color: #0f766e; border: 1px solid #99f6e4; }
    .badge-cat-gardening   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .badge-cat-repairpaint { background: #fff4e6; color: #9a3412; border: 1px solid #fdba74; }
    .badge-cat-other       { background: var(--wave-light); color: var(--wave); border: 1px solid #bae6fd; }
    /* Responsible badges */
    .badge-resp-club       { background: #fdf2f2; color: #7B1A1A; border: 1px solid #fca5a5; }
    .badge-resp-council    { background: #f0f4f8; color: #334e68; border: 1px solid #bcccdc; }
    .badge-resp-trade      { background: #fdf6ee; color: #7c4a03; border: 1px solid #e4a96a; }
    .badge-resp-workingbee { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    .job-location {
      font-size: 12px;
      color: var(--ink-mid);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .job-location .loc-icon { font-size: 11px; }

    /* Photo */
    .job-photo-wrap { padding: 0 16px 12px 62px; }
    .job-photo {
      width: 100%;
      max-width: 340px;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid var(--stone);
      transition: opacity 0.15s;
      display: block;
    }
    .job-photo:hover { opacity: 0.88; }

    /* Notes */
    .job-notes { padding: 0 16px 12px 62px; font-size: 12px; color: var(--ink-mid); line-height: 1.6; }

    /* Date */
    .job-date { font-size: 10px; color: #bbb; padding: 0 16px 10px 62px; }

    /* Footer actions */
    .job-footer {
      border-top: 1px solid var(--cream-dark);
      background: var(--cream);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .done-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .done-checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--maroon);
      cursor: pointer;
      flex-shrink: 0;
    }
    .done-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      flex: 1;
    }
    .done-by { font-size: 10px; color: #aaa; }

    .feedback-wrap { display: flex; flex-direction: column; gap: 6px; }
    .feedback-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--ink-mid); }
    .feedback-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--stone);
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--font);
      resize: vertical;
      min-height: 60px;
      line-height: 1.5;
      color: var(--ink);
      background: #fff;
    }
    .feedback-input:focus { outline: none; border-color: var(--maroon); }
    .feedback-save-row { display: flex; align-items: center; gap: 8px; }
    .save-btn {
      padding: 5px 14px;
      background: var(--maroon);
      color: var(--cream);
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.12s;
    }
    .save-btn:hover { background: var(--maroon-light); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-status { font-size: 11px; color: var(--green); display: none; }
    .save-status.visible { display: inline; }

    /* ── Edit panel ── */
    .edit-btn {
      padding: 4px 12px;
      background: transparent;
      color: var(--ink-mid);
      border: 1px solid var(--stone);
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.12s;
      margin-left: auto;
    }
    .edit-btn:hover { background: var(--cream-dark); border-color: var(--ink-mid); }
    .edit-panel {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--stone);
      border-radius: 8px;
    }
    .edit-panel.open { display: flex; }
    .edit-row { display: flex; flex-direction: column; gap: 3px; }
    .edit-row label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--ink-mid); }
    .edit-row input, .edit-row select, .edit-row textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--stone);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font);
      color: var(--ink);
      background: #fff;
    }
    .edit-row input:focus, .edit-row select:focus, .edit-row textarea:focus { outline: none; border-color: var(--maroon); }
    .edit-row textarea { resize: vertical; min-height: 60px; }
    .edit-photo-preview { max-width: 100%; max-height: 120px; border-radius: 6px; margin-top: 6px; object-fit: cover; }
    .edit-save-btn {
      padding: 9px;
      background: var(--maroon);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
    }
    .edit-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .edit-upload-label {
      display: inline-block;
      padding: 6px 12px;
      background: var(--cream-dark);
      border: 1px solid var(--stone);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink-mid);
    }

    /* ── Comments thread ── */
    .comments-section { display: flex; flex-direction: column; gap: 0; }
    .comments-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--ink-mid); margin-bottom: 8px; }
    .comment-thread { display: flex; flex-direction: column; }
    .comment-entry { padding: 8px 0; border-top: 1px solid var(--cream-dark); }
    .comment-entry:first-child { border-top: none; padding-top: 0; }
    .comment-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
    .comment-author { font-size: 11px; font-weight: 700; color: var(--ink); }
    .comment-time { font-size: 10px; color: #aaa; }
    .comment-text { font-size: 12px; color: var(--ink); line-height: 1.5; word-break: break-word; }
    .comment-img { max-width: 100%; max-height: 160px; border-radius: 6px; margin-top: 6px; display: block; cursor: pointer; object-fit: cover; border: 1px solid var(--stone); }
    .comment-vid { max-width: 100%; max-height: 160px; border-radius: 6px; margin-top: 6px; display: block; }
    .comment-add { border-top: 1px solid var(--cream-dark); padding-top: 10px; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .comment-input { width: 100%; padding: 8px 10px; border: 1px solid var(--stone); border-radius: 6px; font-size: 12px; font-family: var(--font); resize: none; min-height: 52px; color: var(--ink); background: #fff; }
    .comment-input:focus { outline: none; border-color: var(--maroon); }
    .comment-action-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .comment-post-btn { padding: 6px 16px; background: var(--maroon); color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .comment-post-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .comment-status { font-size: 11px; color: var(--green); }
    .no-comments { font-size: 11px; color: #bbb; font-style: italic; padding: 4px 0 8px; }

    /* ── Photo lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #bbb;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 13px; line-height: 1.7; }

    /* ── Loading ── */
    #loading-bar {
      background: var(--maroon);
      height: 3px;
      width: 0%;
      transition: width 0.3s;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .controls { gap: 8px; }
      .filter-select { font-size: 12px; }
      .job-photo-wrap { padding-left: 16px; }
      .job-notes { padding-left: 16px; }
      .job-date { padding-left: 16px; }
    }
  </style>
</head>
<body>

<div id="loading-bar"></div>

<header>
  <div class="header-inner">
    <img src="logo.png" alt="Freshie Heros" class="header-logo">
    <div class="header-text">
      <h1>Freshie Heros</h1>
      <div class="subtitle">Freshwater Surf Life Saving Club · Job Board</div>
    </div>
  </div>
  <div class="header-bar">
    <span>Not all heroes wear patrol caps · Fix it · Clean it · Paint it · Keep it Fresh</span>
    &nbsp;·&nbsp;
    <span>Last updated: <span id="last-updated">Loading...</span></span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search jobs..." oninput="applyFilters()">
  </div>
  <select class="filter-select" id="filter-priority" onchange="applyFilters()">
    <option value="">All priorities</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>
  <select class="filter-select" id="filter-category" onchange="applyFilters()">
    <option value="">All categories</option>
    <option value="Repair">Repair</option>
    <option value="Replace">Replace</option>
    <option value="Painting">Painting</option>
    <option value="Cleaning">Cleaning</option>
  </select>
  <select class="filter-select" id="filter-responsible" onchange="applyFilters()">
    <option value="">All responsible</option>
    <option value="Club">Club</option>
    <option value="Council">Council</option>
    <option value="Trades">Trades</option>
  </select>
  <button class="toggle-done" id="toggle-done-btn" onclick="toggleShowDone()">Hide Completed</button>
</div>

<div class="name-banner">
  <div class="name-row">
    <label for="volunteer-name">👤 Your name:</label>
    <input type="text" id="volunteer-name" placeholder="Enter your name to log updates..." oninput="saveName()">
    <span class="name-hint">Used when you mark jobs done or add feedback</span>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="jobs-wrap" id="jobs-wrap">
  <div class="empty-state">
    <div class="icon">🌊</div>
    <p>Loading jobs...</p>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox(event)">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const API = 'https://batur-core-production.up.railway.app';

let allJobs = [];
let feedbackData = {}; // job_id → { done, submitted_by, updated_at }
let commentsData = {}; // job_id → [ { id, comment, photo, submitted_by, created_at }, ... ]
let commentPhotoFiles = {}; // job_id → File (pending upload for new comment)
let showDone = true;

// ── Boot ────────────────────────────────────────────────────
(async function boot() {
  loadBar(10);
  const name = localStorage.getItem('freshie_name');
  if (name) document.getElementById('volunteer-name').value = name;

  try {
    const [jobsRes, feedbackRes, commentsRes] = await Promise.all([
      fetch(`${API}/surf/jobs-list`),
      fetch(`${API}/surf/jobs`),
      fetch(`${API}/surf/comments`)
    ]);
    loadBar(70);

    const jobsData = await jobsRes.json();
    // normalise job_id → id for compatibility with card rendering
    allJobs = (jobsData.jobs || []).map(j => ({ ...j, id: j.job_id }));

    if (jobsData.updated) {
      const d = new Date(jobsData.updated);
      document.getElementById('last-updated').textContent =
        d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) +
        ' ' + d.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
    }

    const fd = await feedbackRes.json();
    (fd.feedback || []).forEach(f => { feedbackData[f.job_id] = f; });

    const cd = await commentsRes.json();
    (cd.comments || []).forEach(c => {
      if (!commentsData[c.job_id]) commentsData[c.job_id] = [];
      commentsData[c.job_id].push(c);
    });

    loadBar(100);
    render();
    setTimeout(() => { document.getElementById('loading-bar').style.display = 'none'; }, 400);
  } catch (err) {
    document.getElementById('jobs-wrap').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <p>Could not load jobs. Check your connection and try again.</p>
      </div>`;
    loadBar(0);
  }
})();

function loadBar(pct) {
  const bar = document.getElementById('loading-bar');
  bar.style.display = 'block';
  bar.style.width = pct + '%';
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const wrap = document.getElementById('jobs-wrap');
  if (!allJobs.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🏄</div><p>No jobs listed yet.</p></div>';
    return;
  }

  wrap.innerHTML = '';
  allJobs.forEach(job => {
    const el = buildCard(job);
    wrap.appendChild(el);
  });

  applyFilters();
  renderStats();
}

const CATEGORY_MAP = {
  'repair':       { cls: 'badge-cat-repair',      emoji: '🔧' },
  'replace':      { cls: 'badge-cat-replace',     emoji: '🔄' },
  'painting':     { cls: 'badge-cat-painting',    emoji: '🎨' },
  'cleaning':     { cls: 'badge-cat-cleaning',    emoji: '🧹' },
  'gardening':    { cls: 'badge-cat-gardening',   emoji: '🌿' },
  'repair/paint': { cls: 'badge-cat-repairpaint', emoji: '🔧🎨' },
};

const RESPONSIBLE_MAP = {
  'club':             { cls: 'badge-resp-club',       emoji: '🏄' },
  'council':          { cls: 'badge-resp-council',    emoji: '🏛️' },
  'trade':            { cls: 'badge-resp-trade',      emoji: '🔨' },
  'working bee':      { cls: 'badge-resp-workingbee', emoji: '🐝' },
};

function categoryBadgeHtml(cat) {
  const key = cat.toLowerCase().trim();
  const def = CATEGORY_MAP[key] || { cls: 'badge-cat-other', emoji: '📋' };
  return `<span class="badge ${def.cls}">${def.emoji} ${esc(cat)}</span>`;
}

function responsibleBadgeHtml(resp) {
  const key = Object.keys(RESPONSIBLE_MAP).find(k => resp.toLowerCase().includes(k));
  const def = key ? RESPONSIBLE_MAP[key] : { cls: 'badge-resp-club', emoji: '👥' };
  return `<span class="badge ${def.cls}">${def.emoji} ${esc(resp)}</span>`;
}

function buildCard(job) {
  const fb = feedbackData[job.id] || {};
  const isDone = fb.done || false;
  const doneBy = fb.submitted_by || '';

  const card = document.createElement('div');
  card.className = 'job-card' + (isDone ? ' is-done' : '');
  card.dataset.id = job.id;
  card.dataset.priority = job.priority || '';
  card.dataset.category = job.category || '';
  card.dataset.responsible = job.responsible || '';

  const priorityBadge = job.priority
    ? `<span class="badge badge-${job.priority.toLowerCase()}">${job.priority}</span>` : '';
  const safetyBadge = job.safety_concern === 'Yes' || job.safety_concern === true
    ? `<span class="badge badge-safety">⚠ Safety</span>` : '';
  const categoryBadge = job.category ? categoryBadgeHtml(job.category) : '';
  const responsibleBadge = job.responsible ? responsibleBadgeHtml(job.responsible) : '';

  const photoHtml = job.photo ? buildMediaHtml(job.photo) : '';

  const notesHtml = job.notes
    ? `<div class="job-notes">${esc(job.notes)}</div>` : '';

  const dateHtml = job.date
    ? `<div class="job-date">Logged ${fmtDate(job.date)}</div>` : '';

  const doneByHtml = (isDone && doneBy)
    ? `<span class="done-by">Marked done by ${esc(doneBy)}</span>` : '';

  const jobComments = commentsData[job.id] || [];
  const threadHtml = jobComments.length
    ? jobComments.map(c => {
        const author = c.submitted_by ? esc(c.submitted_by) : 'Anonymous';
        const mediaHtml = c.photo
          ? (isVideo(c.photo)
              ? `<video class="comment-vid" src="${esc(c.photo)}" controls preload="none"></video>`
              : `<img class="comment-img" src="${esc(c.photo)}" alt="Comment photo" onclick="openLightbox('${esc(c.photo)}')">`)
          : '';
        const textHtml = c.comment ? `<div class="comment-text">${esc(c.comment)}</div>` : '';
        return `<div class="comment-entry">
          <div class="comment-meta">
            <span class="comment-author">${author}</span>
            <span class="comment-time">${timeAgo(c.created_at)}</span>
          </div>
          ${textHtml}${mediaHtml}
        </div>`;
      }).join('')
    : '<div class="no-comments">No comments yet — be the first to add one.</div>';

  const commentsHtml = `<div class="comments-section">
    <div class="comments-label">Comments</div>
    <div class="comment-thread">${threadHtml}</div>
    <div class="comment-add">
      <textarea class="comment-input" id="cmnt-input-${esc(job.id)}" rows="2" placeholder="Add a comment..."></textarea>
      <div class="comment-action-row">
        <button class="comment-post-btn" onclick="postComment('${esc(job.id)}')">Post</button>
        <label class="edit-upload-label" for="cmnt-photo-${esc(job.id)}" style="font-size:11px;padding:5px 10px">📷 Photo / Video</label>
        <input type="file" id="cmnt-photo-${esc(job.id)}" accept="image/*,video/*" style="display:none" onchange="stageCmntPhoto('${esc(job.id)}', this)">
        <span class="comment-status" id="cmnt-status-${esc(job.id)}"></span>
      </div>
      <div id="cmnt-preview-${esc(job.id)}"></div>
    </div>
  </div>`;

  const editPriority = job.priority || '';
  const editSafety = job.safety_concern || '';
  const editResp = job.responsible || '';
  const editCat = job.category || '';
  const currentPhotoHtml = job.photo
    ? (isVideo(job.photo)
        ? `<video class="edit-photo-preview" src="${esc(job.photo)}" controls></video>`
        : `<img class="edit-photo-preview" src="${esc(job.photo)}" alt="Current photo">`)
    : '';

  const editPanelHtml = `
    <div class="edit-panel" id="edit-panel-${esc(job.id)}">
      <div class="edit-row">
        <label>Priority</label>
        <select id="edit-priority-${esc(job.id)}">
          <option value="">— Not set —</option>
          <option value="High"${editPriority === 'High' ? ' selected' : ''}>High</option>
          <option value="Medium"${editPriority === 'Medium' ? ' selected' : ''}>Medium</option>
          <option value="Low"${editPriority === 'Low' ? ' selected' : ''}>Low</option>
        </select>
      </div>
      <div class="edit-row">
        <label>Location</label>
        <input type="text" id="edit-location-${esc(job.id)}" value="${esc(job.location)}">
      </div>
      <div class="edit-row">
        <label>Issue / Description</label>
        <textarea id="edit-issue-${esc(job.id)}">${esc(job.issue)}</textarea>
      </div>
      <div class="edit-row">
        <label>Safety concern</label>
        <select id="edit-safety-${esc(job.id)}">
          <option value="No"${editSafety !== 'Yes' ? ' selected' : ''}>No</option>
          <option value="Yes"${editSafety === 'Yes' ? ' selected' : ''}>Yes</option>
        </select>
      </div>
      <div class="edit-row">
        <label>Responsible</label>
        <select id="edit-responsible-${esc(job.id)}">
          <option value="">— Not set —</option>
          <option value="Club"${editResp.includes('Club') ? ' selected' : ''}>🏄 Club</option>
          <option value="Council"${editResp.includes('Council') ? ' selected' : ''}>🏛️ Council</option>
          <option value="Trades"${editResp.toLowerCase().includes('trade') ? ' selected' : ''}>🔨 Trades</option>
          <option value="Working Bee"${editResp.toLowerCase().includes('working') ? ' selected' : ''}>🐝 Working Bee</option>
        </select>
      </div>
      <div class="edit-row">
        <label>Category</label>
        <select id="edit-category-${esc(job.id)}">
          <option value="">— Not set —</option>
          <option value="Repair"${editCat === 'Repair' ? ' selected' : ''}>🔧 Repair</option>
          <option value="Replace"${editCat === 'Replace' ? ' selected' : ''}>🔄 Replace</option>
          <option value="Painting"${editCat === 'Painting' ? ' selected' : ''}>🎨 Painting</option>
          <option value="Cleaning"${editCat === 'Cleaning' ? ' selected' : ''}>🧹 Cleaning</option>
          <option value="Gardening"${editCat === 'Gardening' ? ' selected' : ''}>🌿 Gardening</option>
          <option value="Repair/Paint"${editCat.includes('Paint') && editCat.includes('Repair') ? ' selected' : ''}>🔧🎨 Repair/Paint</option>
          <option value="Other"${editCat === 'Other' ? ' selected' : ''}>📋 Other</option>
        </select>
      </div>
      <div class="edit-row">
        <label>Notes</label>
        <textarea id="edit-notes-${esc(job.id)}">${esc(job.notes || '')}</textarea>
      </div>
      <div class="edit-row">
        <label>Photo / Video</label>
        ${currentPhotoHtml}
        <label class="edit-upload-label" for="edit-photo-file-${esc(job.id)}">📷 Take or choose photo / video</label>
        <input type="file" id="edit-photo-file-${esc(job.id)}" accept="image/*,video/*" style="display:none" onchange="previewEditPhoto('${esc(job.id)}', this)">
        <div id="edit-photo-new-${esc(job.id)}"></div>
      </div>
      <div id="edit-status-${esc(job.id)}" style="font-size:11px;text-align:center;min-height:16px"></div>
      <div style="display:flex;gap:8px">
        <button class="edit-save-btn" style="flex:1" onclick="saveEdit('${esc(job.id)}')">Save Changes</button>
        <button style="flex:0;padding:9px 16px;background:var(--stone);color:var(--ink);border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)" onclick="closeEditPanel('${esc(job.id)}')">Cancel</button>
      </div>
    </div>`;

  card.innerHTML = `
    <div class="job-header">
      <div class="job-number">#${esc(job.id)}</div>
      <div class="job-main">
        <div class="job-title">${esc(job.issue)}</div>
        <div class="job-badges">
          ${priorityBadge}${safetyBadge}${categoryBadge}${responsibleBadge}
        </div>
        <div class="job-location">
          <span class="loc-icon">📍</span>
          <span>${esc(job.location)}</span>
        </div>
      </div>
    </div>
    ${photoHtml}
    ${notesHtml}
    ${dateHtml}
    <div class="job-footer">
      <div class="done-row">
        <input type="checkbox" class="done-checkbox" id="done-${esc(job.id)}"
          ${isDone ? 'checked' : ''}
          onchange="toggleDone('${esc(job.id)}', this.checked)">
        <label class="done-label" for="done-${esc(job.id)}">Mark as completed</label>
        ${doneByHtml}
        <button class="edit-btn" onclick="openEditPanel('${esc(job.id)}')">✏️ Edit</button>
      </div>
      ${commentsHtml}
      ${editPanelHtml}
    </div>`;

  return card;
}

function renderStats() {
  const total = allJobs.length;
  const high = allJobs.filter(j => j.priority === 'High').length;
  const done = Object.values(feedbackData).filter(f => f.done).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip total"><div class="stat-dot" style="background:#7B1A1A"></div>${total} job${total !== 1 ? 's' : ''} listed</div>
    ${high ? `<div class="stat-chip high"><div class="stat-dot" style="background:#b91c1c"></div>${high} high priority</div>` : ''}
    ${done ? `<div class="stat-chip done-count"><div class="stat-dot" style="background:#2d6a2d"></div>${done} completed</div>` : ''}
  `;
}

// ── Filters ──────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const priority = document.getElementById('filter-priority').value;
  const category = document.getElementById('filter-category').value;
  const responsible = document.getElementById('filter-responsible').value;

  document.querySelectorAll('.job-card').forEach(card => {
    const job = allJobs.find(j => j.id === card.dataset.id);
    if (!job) return;

    const isDone = feedbackData[job.id]?.done || false;
    if (!showDone && isDone) { card.classList.add('hidden'); return; }

    const matchSearch = !search ||
      job.issue.toLowerCase().includes(search) ||
      job.location.toLowerCase().includes(search) ||
      (job.notes || '').toLowerCase().includes(search);
    const matchPriority = !priority || job.priority === priority;
    const matchCategory = !category || job.category === category;
    const matchResponsible = !responsible || job.responsible === responsible;

    card.classList.toggle('hidden', !(matchSearch && matchPriority && matchCategory && matchResponsible));
  });
}

function toggleShowDone() {
  showDone = !showDone;
  const btn = document.getElementById('toggle-done-btn');
  btn.textContent = showDone ? 'Hide Completed' : 'Show Completed';
  btn.classList.toggle('active', !showDone);
  applyFilters();
}

// ── Done toggle ──────────────────────────────────────────────
async function toggleDone(jobId, done) {
  const name = document.getElementById('volunteer-name').value.trim() || null;
  const card = document.querySelector(`.job-card[data-id="${jobId}"]`);

  try {
    await fetch(`${API}/surf/jobs/${encodeURIComponent(jobId)}/done`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done, submitted_by: name })
    });

    if (!feedbackData[jobId]) feedbackData[jobId] = {};
    feedbackData[jobId].done = done;
    feedbackData[jobId].submitted_by = name;

    if (card) {
      card.classList.toggle('is-done', done);
      const title = card.querySelector('.job-title');
      if (title) title.style.textDecoration = done ? 'line-through' : '';
    }
    renderStats();
    applyFilters();
  } catch {
    // Revert checkbox on failure
    const checkbox = document.getElementById(`done-${jobId}`);
    if (checkbox) checkbox.checked = !done;
  }
}

// ── Comments ──────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(ts).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
}

function stageCmntPhoto(jobId, input) {
  const file = input.files[0];
  if (!file) return;
  commentPhotoFiles[jobId] = file;
  const preview = document.getElementById(`cmnt-preview-${jobId}`);
  if (!preview) return;
  const url = URL.createObjectURL(file);
  if (isVideo(file.name)) {
    preview.innerHTML = `<video class="comment-vid" src="${url}" controls preload="none" style="margin-top:4px"></video>`;
  } else {
    preview.innerHTML = `<img class="comment-img" src="${url}" alt="Preview" style="margin-top:4px">`;
  }
}

async function postComment(jobId) {
  const name = document.getElementById('volunteer-name').value.trim() || null;
  const inputEl = document.getElementById(`cmnt-input-${jobId}`);
  const comment = inputEl ? inputEl.value.trim() : '';
  const btn = inputEl?.closest('.comment-add')?.querySelector('.comment-post-btn');
  const statusEl = document.getElementById(`cmnt-status-${jobId}`);

  if (!comment && !commentPhotoFiles[jobId]) {
    if (statusEl) { statusEl.textContent = 'Add a comment or photo first.'; statusEl.style.color = 'var(--red)'; }
    return;
  }

  if (btn) btn.disabled = true;
  if (statusEl) { statusEl.textContent = 'Posting...'; statusEl.style.color = 'var(--ink-mid)'; }

  try {
    let photoUrl;
    const pendingFile = commentPhotoFiles[jobId];
    if (pendingFile) {
      if (statusEl) statusEl.textContent = 'Uploading...';
      photoUrl = await uploadJobPhoto(pendingFile);
      delete commentPhotoFiles[jobId];
    }

    const res = await fetch(`${API}/surf/jobs/${encodeURIComponent(jobId)}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment, photo: photoUrl || null, submitted_by: name })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Post failed');

    if (!commentsData[jobId]) commentsData[jobId] = [];
    commentsData[jobId].push(data.comment);

    const card = document.querySelector(`.job-card[data-id="${jobId}"]`);
    if (card) card.replaceWith(buildCard(allJobs.find(j => j.id === jobId)));

  } catch (err) {
    if (statusEl) { statusEl.textContent = '✗ ' + (err.message || 'Could not post'); statusEl.style.color = 'var(--red)'; }
    if (btn) btn.disabled = false;
  }
}

// ── Name ─────────────────────────────────────────────────────
function saveName() {
  const name = document.getElementById('volunteer-name').value.trim();
  if (name) localStorage.setItem('freshie_name', name);
}

// ── Edit panel ────────────────────────────────────────────────
function openEditPanel(jobId) {
  const panel = document.getElementById(`edit-panel-${jobId}`);
  if (panel) panel.classList.toggle('open');
}

function closeEditPanel(jobId) {
  const panel = document.getElementById(`edit-panel-${jobId}`);
  if (panel) panel.classList.remove('open');
}

function previewEditPhoto(jobId, input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById(`edit-photo-new-${jobId}`);
  if (!preview) return;
  const url = URL.createObjectURL(file);
  if (isVideo(file.name)) {
    preview.innerHTML = `<video class="edit-photo-preview" src="${url}" controls></video>`;
  } else {
    preview.innerHTML = `<img class="edit-photo-preview" src="${url}" alt="New photo preview">`;
  }
}

async function uploadJobPhoto(file) {
  const form = new FormData();
  form.append('photo', file);
  const res = await fetch(`${API}/surf/upload-photo`, { method: 'POST', body: form });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Photo upload failed');
  return data.url;
}

async function saveEdit(jobId) {
  const statusEl = document.getElementById(`edit-status-${jobId}`);
  const saveBtn = document.querySelector(`#edit-panel-${jobId} .edit-save-btn`);
  if (saveBtn) saveBtn.disabled = true;
  if (statusEl) { statusEl.textContent = 'Saving...'; statusEl.style.color = 'var(--ink-mid)'; }

  try {
    let photoUrl;
    const fileInput = document.getElementById(`edit-photo-file-${jobId}`);
    if (fileInput && fileInput.files[0]) {
      if (statusEl) statusEl.textContent = 'Uploading photo...';
      photoUrl = await uploadJobPhoto(fileInput.files[0]);
    }

    const body = {
      priority: document.getElementById(`edit-priority-${jobId}`)?.value || null,
      location: document.getElementById(`edit-location-${jobId}`)?.value || null,
      issue: document.getElementById(`edit-issue-${jobId}`)?.value || null,
      safety_concern: document.getElementById(`edit-safety-${jobId}`)?.value || null,
      responsible: document.getElementById(`edit-responsible-${jobId}`)?.value || null,
      category: document.getElementById(`edit-category-${jobId}`)?.value || null,
      notes: document.getElementById(`edit-notes-${jobId}`)?.value || null,
    };
    if (photoUrl) body.photo = photoUrl;

    const res = await fetch(`${API}/surf/jobs/${encodeURIComponent(jobId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Save failed');

    const jobIdx = allJobs.findIndex(j => j.id === jobId);
    if (jobIdx !== -1) {
      allJobs[jobIdx] = { ...allJobs[jobIdx], ...data.job, id: jobId };
    }

    const card = document.querySelector(`.job-card[data-id="${jobId}"]`);
    if (card) card.replaceWith(buildCard(allJobs.find(j => j.id === jobId)));

  } catch (err) {
    if (statusEl) { statusEl.textContent = '✗ ' + (err.message || 'Could not save'); statusEl.style.color = 'var(--red)'; }
    if (saveBtn) saveBtn.disabled = false;
  }
}

// ── Media helpers ─────────────────────────────────────────────
function isVideo(url) {
  return /\.(mov|mp4|webm|m4v|avi)(\?.*)?$/i.test(url);
}

function buildMediaHtml(url) {
  if (isVideo(url)) {
    return `<div class="job-photo-wrap">
      <video class="job-photo" src="${esc(url)}" controls preload="none"
        onclick="event.stopPropagation()" style="background:#000;cursor:default">
        Your browser does not support video.
      </video>
    </div>`;
  }
  return `<div class="job-photo-wrap">
    <img class="job-photo" src="${esc(url)}" alt="Photo of issue" loading="lazy"
      onclick="openLightbox('${esc(url)}')">
  </div>`;
}

// ── Lightbox ─────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if (!e || e.target !== document.getElementById('lightbox-img')) {
    document.getElementById('lightbox').classList.remove('open');
  }
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}
</script>
</body>
